<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Salmatek — Coming Soon</title>
  <meta name="description" content="Salmatek. Performance. Trust. Intelligence. Coming soon." />
  <link rel="icon" href="/assets/favicon.png" type="image/png" />
  <link rel="apple-touch-icon" href="/assets/apple-touch-icon.png" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <main class="wrap">
    <div class="mark" aria-hidden="true">
      <svg viewBox="0 0 200 150" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path class="mark-line" pathLength="100" d="M10 20 L190 20" />
        <path class="mark-line" pathLength="100" d="M40 25 L100 75 L40 130" />
        <path class="mark-line" pathLength="100" d="M160 25 L100 75 L160 130" />
        <path class="mark-line" pathLength="100" d="M100 20 L100 130 L120 130" />
      </svg>
    </div>
    <p class="wordmark">SALMATEK</p>
    <p class="tagline">Performance · Trust · Intelligence</p>

    <h1 class="headline">Coming soon.</h1>

    <p class="sub">
      We're building something new. Leave your email and we'll let you know
      the moment it's ready.
    </p>

    <form id="notify-form" class="notify-form" novalidate>
      <label for="email" class="sr-only">Your email address</label>
      <input
        id="email"
        name="email"
        type="email"
        inputmode="email"
        autocomplete="email"
        placeholder="you@email.com"
        required
      />
      <button type="submit" id="notify-btn">
        <span class="btn-label">Notify me</span>
        <span class="btn-spinner" aria-hidden="true"></span>
      </button>
    </form>

    <p class="status" id="status" role="status" aria-live="polite"></p>
  </main>

  <footer class="foot">
    <span>© <span id="year"></span> Salmatek</span>
  </footer>

  <script src="/script.js"></script>
</body>
</html>
